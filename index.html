<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="GeoCAD Pro - Aplicación web para levantamientos topográficos con GPS y medición manual">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GeoCAD Pro - Topo & GPS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            padding-bottom: env(safe-area-inset-bottom); 
            -webkit-tap-highlight-color: transparent;
            font-size: 14px;
            overflow-x: hidden;
        }
        input[type="number"] { 
            font-size: 16px;
        }
        .map-bg {
            aspect-ratio: 1 / 1;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .map-container {
            overflow: hidden;
            cursor: grab;
            touch-action: none;
            position: relative;
        }
        .map-container:active {
            cursor: grabbing;
        }
        .map-container.panning {
            cursor: grabbing;
        }
        button { 
            touch-action: manipulation; 
        }
        .toast {
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(100px);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        @keyframes pulse-share {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .btn-share:hover { 
            animation: pulse-share 0.3s ease-in-out; 
        }
        .modal-overlay {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        /* Controles de zoom */
        .zoom-controls {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 20;
        }
        .zoom-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .zoom-btn:hover {
            background: rgba(15, 23, 42, 1);
            transform: scale(1.1);
        }
        .zoom-btn:active {
            transform: scale(0.95);
        }
        .zoom-level {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            z-index: 20;
        }
        /* Ajustes generales de tipografía */
        h1 { font-size: 1.1rem; }
        h2 { font-size: 0.85rem; }
        .text-display { font-size: 1.5rem; }
        .text-display-lg { font-size: 1.8rem; }
        .btn-text { font-size: 0.75rem; }
        .label-text { font-size: 0.7rem; }
        .table-text { font-size: 0.8rem; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans mb-12 text-sm select-none">

    <header class="bg-slate-900 text-white pt-4 pb-3 shadow-lg sticky top-0 z-50">
        <div class="px-3 flex justify-between items-center">
            <div>
                <h1 class="font-bold text-emerald-400">GeoCAD Pro</h1>
                <p class="text-[10px] text-slate-300 font-medium tracking-widest flex items-center gap-1 mt-0.5">
                    AUTOGUARDADO ON <span class="bg-emerald-500 w-1.5 h-1.5 rounded-full animate-pulse"></span>
                </p>
            </div>
            <div id="descargas-gps" class="flex gap-1.5">
                <button onclick="compartirGPS('kml')" class="btn-share px-2.5 py-1.5 bg-sky-500 rounded-lg text-[10px] font-bold shadow-md hover:bg-sky-400 flex items-center gap-1 transition">
                    📤 .KML
                </button>
                <button onclick="compartirGPS('scr')" class="btn-share px-2.5 py-1.5 bg-blue-600 rounded-lg text-[10px] font-bold shadow-md hover:bg-blue-500 flex items-center gap-1 transition">
                    📤 .SCR
                </button>
            </div>
            <div id="descargas-manual" class="hidden flex gap-1.5">
                <button onclick="compartirManual()" id="btn-compartir-manual" class="btn-share px-2.5 py-1.5 bg-emerald-600 rounded-lg text-[10px] font-bold shadow-md opacity-50 cursor-not-allowed flex items-center gap-1 transition" disabled>
                    📤 CAD
                </button>
            </div>
        </div>
        
        <div class="flex bg-slate-800 text-xs font-bold mt-2">
            <button onclick="cambiarPestana('gps')" id="tab-gps" class="flex-1 py-3 border-b-4 border-blue-500 text-blue-400 transition-colors">
                📍 GPS
            </button>
            <button onclick="cambiarPestana('manual')" id="tab-manual" class="flex-1 py-3 border-b-4 border-transparent text-slate-400 transition-colors">
                📐 CINTA
            </button>
        </div>
    </header>

    <main class="flex-1 relative">

        <!-- VISTA GPS -->
        <div id="vista-gps" class="p-3 space-y-4 pb-28">
            
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">SEÑAL GPS</span>
                    <span id="gps-precision" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 font-bold text-slate-500">Buscando...</span>
                </div>
                <div id="gps-coords-display" class="grid grid-cols-3 gap-1.5 text-xs text-slate-700">
                    <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold">LAT<br>---</div>
                    <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold">LON<br>---</div>
                    <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold">ALT<br>---</div>
                </div>
                <div id="gps-error-panel" class="hidden mt-2 p-2 bg-red-50 rounded-lg border border-red-200 text-xs text-red-700 font-bold"></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-blue-600 text-white p-4 rounded-xl shadow-md flex flex-col justify-center">
                    <span class="text-[9px] uppercase opacity-80 font-bold tracking-wider">Área Estimada</span>
                    <div id="area-gps" class="text-display font-black mt-0.5">0 m²</div>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <span class="text-[9px] uppercase text-slate-500 font-bold tracking-wider">Vértices</span>
                        <button onclick="limpiarGPS()" class="text-red-500 bg-red-50 p-1.5 rounded-lg font-bold text-[9px] uppercase">Borrar</button>
                    </div>
                    <div id="contador-gps" class="text-display font-black text-slate-800">0</div>
                </div>
            </div>

            <!-- Mapa GPS con Pan & Zoom -->
            <div class="bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-700 relative">
                <div class="absolute top-2 left-2 z-10 bg-white/20 backdrop-blur px-2 py-0.5 rounded text-[9px] font-bold text-white flex items-center gap-1">
                    🗺️ Croquis GPS
                    <span id="gps-zoom-indicator" class="opacity-70"></span>
                </div>
                <div class="map-bg map-container w-full" id="map-container-gps" style="height: 280px;">
                    <svg id="svg-gps" width="100%" height="100%" class="overflow-visible">
                        <g id="svg-content-gps">
                            <text id="gps-placeholder" x="0" y="0" fill="#94a3b8" text-anchor="middle" font-size="12" transform="translate(140, 140)">Captura puntos para dibujar</text>
                        </g>
                    </svg>
                    <!-- Controles de Zoom -->
                    <div class="zoom-controls">
                        <button class="zoom-btn" onclick="zoomIn('gps')" title="Acercar">+</button>
                        <button class="zoom-btn" onclick="resetZoom('gps')" title="Vista completa">⌂</button>
                        <button class="zoom-btn" onclick="zoomOut('gps')" title="Alejar">−</button>
                    </div>
                    <div class="zoom-level" id="zoom-level-gps">100%</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="max-h-[180px] overflow-y-auto">
                    <table class="w-full text-xs text-left">
                        <tbody id="lista-gps" class="divide-y divide-slate-100">
                            <tr><td class="p-3 text-center text-slate-400 italic">Los puntos aparecerán aquí</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
                <button onclick="capturarPuntoGPS()" class="bg-blue-600 text-white w-16 h-16 rounded-full shadow-[0_8px_25px_rgba(37,99,235,0.5)] flex items-center justify-center border-4 border-white active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- VISTA MANUAL -->
        <div id="vista-manual" class="hidden p-3 space-y-4">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-3 border-b pb-2">
                    <h2 class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Medidas (Metros)</h2>
                    <button onclick="limpiarManual()" class="text-[10px] text-red-600 font-bold bg-red-50 px-2.5 py-1.5 rounded-lg">LIMPIAR</button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-0.5">
                        <label class="text-[9px] font-bold text-slate-500">Base (L1)</label>
                        <input type="number" id="l1" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-base font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="10.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[9px] font-bold text-slate-500">Derecha (L2)</label>
                        <input type="number" id="l2" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-base font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="20.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[9px] font-bold text-slate-500">Arriba (L3)</label>
                        <input type="number" id="l3" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-base font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="10.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[9px] font-bold text-slate-500">Izquierda (L4)</label>
                        <input type="number" id="l4" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-base font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="20.00" oninput="calcularManual()">
                    </div>
                </div>
                <div class="mt-3 space-y-0.5">
                    <label class="text-[9px] font-bold text-red-600 uppercase">Diagonal (D1)</label>
                    <input type="number" id="d1" step="0.01" class="w-full bg-red-50 border border-red-300 rounded-lg p-2.5 text-base font-mono text-red-700 focus:ring-2 focus:ring-red-500 outline-none" placeholder="22.36" oninput="calcularManual()">
                </div>
                <div id="error-manual" class="hidden mt-2 text-xs text-red-700 font-bold bg-red-100 p-2 rounded-lg border border-red-200"></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-600 text-white p-4 rounded-xl shadow-md flex flex-col justify-center">
                    <span class="text-[9px] uppercase opacity-80 font-bold tracking-wider">Área Exacta</span>
                    <div id="area-manual" class="text-display font-black mt-0.5">0 m²</div>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center">
                    <span class="text-[9px] uppercase text-slate-500 font-bold tracking-wider">Perímetro</span>
                    <div id="perim-manual" class="text-display-lg font-black text-slate-800 mt-0.5">0 m</div>
                </div>
            </div>

            <!-- Mapa Manual con Pan & Zoom -->
            <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-slate-300 relative">
                <div class="absolute top-2 left-2 z-10 bg-white/90 backdrop-blur px-2 py-0.5 rounded text-[9px] font-bold text-slate-600 shadow-sm">
                    📐 Forma Calculada
                </div>
                <div class="map-bg map-container w-full" id="map-container-manual" style="height: 280px;">
                    <svg id="svg-manual" width="100%" height="100%" class="overflow-visible">
                        <g id="svg-content-manual">
                            <text id="manual-placeholder" x="0" y="0" fill="#94a3b8" text-anchor="middle" font-size="12" font-weight="bold" transform="translate(140, 140)">Faltan medidas...</text>
                        </g>
                    </svg>
                    <!-- Controles de Zoom -->
                    <div class="zoom-controls">
                        <button class="zoom-btn" onclick="zoomIn('manual')" title="Acercar">+</button>
                        <button class="zoom-btn" onclick="resetZoom('manual')" title="Vista completa">⌂</button>
                        <button class="zoom-btn" onclick="zoomOut('manual')" title="Alejar">−</button>
                    </div>
                    <div class="zoom-level" id="zoom-level-manual">100%</div>
                </div>
            </div>
            
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-1.5">
                    <span class="text-[9px] font-bold text-slate-600 uppercase">Punto Global</span>
                    <button onclick="capturarRefManual()" id="btn-gps-manual" class="text-[10px] bg-slate-800 text-white px-3 py-1.5 rounded-lg font-bold active:bg-slate-700">ANCLAR GPS</button>
                </div>
                <div id="gps-data-manual" class="text-[10px] text-slate-500 font-mono mt-1.5">
                    Sin coordenada. AutoCAD: X:0, Y:0.
                </div>
            </div>
        </div>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-1/2 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2.5 rounded-full text-xs font-bold opacity-0 pointer-events-none z-50 toast shadow-2xl whitespace-nowrap max-w-[85vw] text-center">
        Notificación
    </div>

    <!-- Modal de Compartir -->
    <div id="modal-compartir" class="hidden"></div>

    <script>
        // === SISTEMA PAN & ZOOM PARA MAPAS ===
        const mapState = {
            gps: { zoom: 1, panX: 0, panY: 0, isPanning: false, startX: 0, startY: 0, viewBox: { x: 0, y: 0, w: 100, h: 100 } },
            manual: { zoom: 1, panX: 0, panY: 0, isPanning: false, startX: 0, startY: 0, viewBox: { x: 0, y: 0, w: 100, h: 100 } }
        };

        function initMapPanZoom(tipo) {
            const container = document.getElementById(`map-container-${tipo}`);
            const svg = document.getElementById(`svg-${tipo}`);
            const state = mapState[tipo];

            // Eventos mouse
            container.addEventListener('mousedown', (e) => startPan(e, tipo));
            container.addEventListener('mousemove', (e) => doPan(e, tipo));
            container.addEventListener('mouseup', () => endPan(tipo));
            container.addEventListener('mouseleave', () => endPan(tipo));

            // Eventos touch
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    startPan(e.touches[0], tipo);
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    startPinch(e, tipo);
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && state.isPanning) {
                    doPan(e.touches[0], tipo);
                    e.preventDefault();
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    doPinch(e, tipo);
                }
            }, { passive: false });

            container.addEventListener('touchend', () => endPan(tipo));

            // Wheel zoom
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                applyZoom(tipo, delta);
            }, { passive: false });

            // Guardar viewBox inicial
            const content = document.getElementById(`svg-content-${tipo}`);
            if (content) {
                const bbox = content.getBBox();
                state.viewBox = { x: bbox.x, y: bbox.y, w: bbox.width || 100, h: bbox.height || 100 };
            }
        }

        function startPan(e, tipo) {
            const state = mapState[tipo];
            state.isPanning = true;
            state.startX = e.clientX;
            state.startY = e.clientY;
            document.getElementById(`map-container-${tipo}`).classList.add('panning');
        }

        function doPan(e, tipo) {
            const state = mapState[tipo];
            if (!state.isPanning) return;

            const container = document.getElementById(`map-container-${tipo}`);
            const deltaX = (e.clientX - state.startX) / state.zoom;
            const deltaY = (e.clientY - state.startY) / state.zoom;

            state.panX += deltaX;
            state.panY += deltaY;
            state.startX = e.clientX;
            state.startY = e.clientY;

            updateMapView(tipo);
        }

        function endPan(tipo) {
            const state = mapState[tipo];
            state.isPanning = false;
            document.getElementById(`map-container-${tipo}`).classList.remove('panning');
        }

        function startPinch(e, tipo) {
            const state = mapState[tipo];
            state.pinchStartDist = getPinchDistance(e.touches);
            state.pinchStartZoom = state.zoom;
        }

        function doPinch(e, tipo) {
            const state = mapState[tipo];
            const currentDist = getPinchDistance(e.touches);
            const scale = currentDist / state.pinchStartDist;
            applyZoom(tipo, scale * state.pinchStartZoom / state.zoom);
        }

        function getPinchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function zoomIn(tipo) {
            applyZoom(tipo, 1.3);
        }

        function zoomOut(tipo) {
            applyZoom(tipo, 0.7);
        }

        function resetZoom(tipo) {
            const state = mapState[tipo];
            state.zoom = 1;
            state.panX = 0;
            state.panY = 0;
            updateMapView(tipo);
            updateZoomIndicator(tipo);
            showToast('🔍 Vista reseteada');
        }

        function applyZoom(tipo, factor) {
            const state = mapState[tipo];
            const newZoom = Math.max(0.2, Math.min(5, state.zoom * factor));
            
            if (newZoom !== state.zoom) {
                state.zoom = newZoom;
                updateMapView(tipo);
                updateZoomIndicator(tipo);
            }
        }

        function updateMapView(tipo) {
            const content = document.getElementById(`svg-content-${tipo}`);
            const state = mapState[tipo];
            
            if (content) {
                content.setAttribute('transform', `translate(${state.panX}, ${state.panY}) scale(${state.zoom})`);
            }
        }

        function updateZoomIndicator(tipo) {
            const indicator = document.getElementById(`zoom-level-${tipo}`);
            const state = mapState[tipo];
            if (indicator) {
                indicator.textContent = `${Math.round(state.zoom * 100)}%`;
            }
        }

        function setMapViewBox(tipo, x, y, w, h) {
            const state = mapState[tipo];
            state.viewBox = { x, y, w, h };
            const svg = document.getElementById(`svg-${tipo}`);
            if (svg) {
                svg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
            }
            // Resetear pan/zoom cuando cambia el viewBox
            state.panX = 0;
            state.panY = 0;
            state.zoom = 1;
            updateMapView(tipo);
            updateZoomIndicator(tipo);
        }

        // Inicializar mapas al cargar
        window.addEventListener('load', () => {
            initMapPanZoom('gps');
            initMapPanZoom('manual');
        });

        // === UTILIDADES GENERALES ===
        function cambiarPestana(vista) {
            const vGps = document.getElementById('vista-gps'), vMan = document.getElementById('vista-manual');
            const tGps = document.getElementById('tab-gps'), tMan = document.getElementById('tab-manual');
            const dGps = document.getElementById('descargas-gps'), dMan = document.getElementById('descargas-manual');

            if (vista === 'gps') {
                vGps.classList.remove('hidden'); vMan.classList.add('hidden');
                dGps.classList.remove('hidden'); dMan.classList.add('hidden');
                tGps.className = "flex-1 py-3 border-b-4 border-blue-500 text-blue-400 transition-colors";
                tMan.className = "flex-1 py-3 border-b-4 border-transparent text-slate-400 transition-colors";
                setTimeout(() => initMapPanZoom('gps'), 100);
            } else {
                vGps.classList.add('hidden'); vMan.classList.remove('hidden');
                dGps.classList.add('hidden'); dMan.classList.remove('hidden');
                tMan.className = "flex-1 py-3 border-b-4 border-emerald-500 text-emerald-400 transition-colors";
                tGps.className = "flex-1 py-3 border-b-4 border-transparent text-slate-400 transition-colors";
                setTimeout(() => initMapPanZoom('manual'), 100);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function triggerDescarga(contenido, nombreArchivo, tipoMime = 'text/plain') {
            if (nombreArchivo.endsWith('.kml')) tipoMime = 'application/vnd.google-earth.kml+xml';
            if (nombreArchivo.endsWith('.scr')) tipoMime = 'text/plain';
            
            try {
                const blob = new Blob([contenido], { type: tipoMime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = nombreArchivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
                showToast(`📥 ${nombreArchivo}`);
                return true;
            } catch (e) {
                console.error('Error en descarga:', e);
                showToast('❌ Error al descargar');
                return false;
            }
        }

        // === FUNCIONES DE COMPARTIR ===
        async function compartirArchivo(contenido, nombreArchivo, tipoMime) {
            if (nombreArchivo.endsWith('.kml')) tipoMime = 'application/vnd.google-earth.kml+xml';
            
            if (navigator.share) {
                try {
                    const file = new File([contenido], nombreArchivo, { type: tipoMime });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'GeoCAD Pro - Levantamiento',
                            text: 'Te comparto este levantamiento topográfico 🗺️',
                            files: [file]
                        });
                        showToast('✅ Enviado');
                        return;
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') console.log('Share fallback:', err);
                }
            }
            
            mostrarOpcionesCompartir(contenido, nombreArchivo, tipoMime);
        }

        function mostrarOpcionesCompartir(contenido, nombreArchivo, tipoMime) {
            const existing = document.getElementById('modal-compartir');
            if (existing && !existing.classList.contains('hidden')) return;
            
            const textoBase = encodeURIComponent(`🗺️ Levantamiento GeoCAD: ${nombreArchivo}`);
            
            const modal = document.createElement('div');
            modal.id = 'modal-compartir';
            modal.className = 'fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl p-4 max-w-sm w-full shadow-2xl">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-sm text-slate-800">📤 Compartir</h3>
                        <button onclick="cerrarModalCompartir()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                    </div>
                    
                    <p class="text-xs text-slate-600 mb-3">Compartir <strong>${nombreArchivo}</strong>:</p>
                    
                    <div class="space-y-2">
                        <a href="https://wa.me/?text=${textoBase}%0A%0A💡 Descarga el archivo y adjúntalo manualmente." 
                           target="_blank" rel="noopener"
                           class="flex items-center gap-2 p-3 bg-[#25D366] text-white rounded-lg font-bold hover:bg-[#128C7E] transition text-sm">
                            <span>💬</span> WhatsApp
                        </a>
                        
                        <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${textoBase}" 
                           target="_blank" rel="noopener"
                           class="flex items-center gap-2 p-3 bg-[#0088cc] text-white rounded-lg font-bold hover:bg-[#006699] transition text-sm">
                            <span>✈️</span> Telegram
                        </a>
                        
                        <a href="mailto:?subject=${encodeURIComponent('GeoCAD - ' + nombreArchivo)}&body=${encodeURIComponent(`Levantamiento: ${nombreArchivo}\n\nApp: ${window.location.href}`)}" 
                           class="flex items-center gap-2 p-3 bg-slate-700 text-white rounded-lg font-bold hover:bg-slate-800 transition text-sm">
                            <span>📧</span> Correo
                        </a>
                        
                        <button onclick="cerrarModalCompartir(); triggerDescarga('${contenido.replace(/'/g, "\\'").replace(/\n/g, '\\n')}', '${nombreArchivo}', '${tipoMime}')" 
                                class="w-full p-3 bg-slate-200 text-slate-700 rounded-lg font-bold hover:bg-slate-300 transition text-sm flex items-center justify-center gap-2">
                            ⬇️ Descargar
                        </button>
                    </div>
                    
                    <p class="text-[10px] text-slate-500 mt-3 text-center">
                        💡 WhatsApp no permite adjuntar archivos vía enlace. Descarga primero.
                    </p>
                </div>
            `;
            document.body.appendChild(modal);
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) cerrarModalCompartir();
            });
        }

        function cerrarModalCompartir() {
            const modal = document.getElementById('modal-compartir');
            if (modal) {
                modal.classList.add('hidden');
                setTimeout(() => modal.remove(), 200);
            }
        }

        // === CONSTANTES ===
        const R = 6371000;

        // === MÓDULO GPS ===
        let puntosGPS = [];
        let actualGPS = null;

        function guardarEstadoGPS() { 
            try { localStorage.setItem('geoCad_puntosGPS', JSON.stringify(puntosGPS)); } 
            catch(e) { console.log('GPS save:', e); }
        }

        function limpiarGPS() {
            if(confirm("¿Borrar todos los puntos GPS?")) {
                puntosGPS = []; 
                guardarEstadoGPS(); 
                renderTablaGPS(); 
                dibujarMapaGPS(); 
                calcularAreaGPS();
                showToast("🗑️ Borrado");
            }
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                pos => {
                    actualGPS = { 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude, 
                        alt: pos.coords.altitude || 0, 
                        acc: pos.coords.accuracy 
                    };
                    document.getElementById('gps-error-panel').classList.add('hidden');
                    document.getElementById('gps-coords-display').innerHTML = `
                        <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold text-[10px]">LAT<br>${actualGPS.lat.toFixed(5)}</div>
                        <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold text-[10px]">LON<br>${actualGPS.lng.toFixed(5)}</div>
                        <div class="bg-slate-50 p-2 rounded-lg text-center border border-slate-200 font-mono font-bold text-[10px]">ALT<br>${actualGPS.alt.toFixed(0)}m</div>
                    `;
                    const badge = document.getElementById('gps-precision');
                    badge.innerText = `±${actualGPS.acc.toFixed(1)}m`;
                    badge.className = `text-[10px] px-2 py-0.5 rounded-full font-bold text-white ${actualGPS.acc < 8 ? 'bg-green-600' : actualGPS.acc < 20 ? 'bg-orange-500' : 'bg-red-500'}`;
                },
                err => {
                    const ep = document.getElementById('gps-error-panel'); 
                    ep.classList.remove('hidden');
                    ep.innerText = err.code === 1 ? "⚠️ Permiso GPS denegado" : "📡 Buscando señal...";
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function capturarPuntoGPS() {
            if (!actualGPS) return showToast("⏳ Esperando GPS...");
            puntosGPS.push({...actualGPS, id: Date.now()});
            guardarEstadoGPS(); 
            showToast(`✅ Punto #${puntosGPS.length}`);
            renderTablaGPS(); 
            dibujarMapaGPS(); 
            calcularAreaGPS();
        }

        function eliminarPuntoGPS(id) {
            if(confirm("¿Eliminar este punto?")) {
                puntosGPS = puntosGPS.filter(p => p.id !== id);
                guardarEstadoGPS(); 
                renderTablaGPS(); 
                dibujarMapaGPS(); 
                calcularAreaGPS();
            }
        }

        function renderTablaGPS() {
            document.getElementById('contador-gps').innerText = puntosGPS.length;
            if (puntosGPS.length === 0) {
                document.getElementById('lista-gps').innerHTML = '<tr><td class="p-3 text-center text-slate-400 italic text-xs">Captura puntos del perímetro</td></tr>';
                return;
            }
            const html = puntosGPS.slice().reverse().map(p => `
                <tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="p-3 font-bold text-blue-600 text-xs">#${puntosGPS.length - puntosGPS.indexOf(p)}</td>
                    <td class="p-3 font-mono text-slate-600 text-[10px]">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</td>
                    <td class="p-3 text-right">
                        <button onclick="eliminarPuntoGPS(${p.id})" class="text-red-500 font-bold bg-red-50 px-2 py-1 rounded text-[10px] hover:bg-red-100">X</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('lista-gps').innerHTML = html;
        }

        function calcularAreaGPS() {
            if (puntosGPS.length < 3) {
                document.getElementById('area-gps').innerText = "0 m²";
                return;
            }
            const origin = puntosGPS[0];
            const coords = puntosGPS.map(p => ({
                x: (p.lng - origin.lng) * (Math.PI / 180) * R * Math.cos(origin.lat * Math.PI / 180),
                y: (p.lat - origin.lat) * (Math.PI / 180) * R
            }));
            let area = 0;
            for (let i = 0; i < coords.length; i++) {
                let j = (i + 1) % coords.length;
                area += coords[i].x * coords[j].y - coords[j].x * coords[i].y;
            }
            document.getElementById('area-gps').innerText = (Math.abs(area) / 2).toLocaleString(undefined, {maximumFractionDigits: 1}) + " m²";
        }

        function dibujarMapaGPS() {
            const content = document.getElementById('svg-content-gps');
            if (puntosGPS.length === 0) { 
                content.innerHTML = '<text x="0" y="0" fill="#94a3b8" text-anchor="middle" font-size="12" transform="translate(140, 140)">Captura puntos para dibujar</text>';
                setMapViewBox('gps', -50, -50, 100, 100);
                return; 
            }
            const origin = puntosGPS[0];
            const coords = puntosGPS.map(p => ({ 
                x: (p.lng - origin.lng) * (Math.PI / 180) * R * Math.cos(origin.lat * Math.PI / 180), 
                y: (p.lat - origin.lat) * (Math.PI / 180) * R 
            }));
            const xs = coords.map(c => c.x), ys = coords.map(c => c.y);
            const w = (Math.max(...xs) - Math.min(...xs)) || 2, h = (Math.max(...ys) - Math.min(...ys)) || 2;
            const pad = Math.max(w, h) * 0.3 || 10;
            
            // Actualizar viewBox
            setMapViewBox('gps', Math.min(...xs) - pad, Math.min(...ys) - pad, w + pad*2, h + pad*2);
            
            let html = '';
            
            if (coords.length > 1) {
                const pts = coords.map(c => `${c.x},${-c.y}`).join(' ');
                html += `<polyline points="${pts}" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="${Math.max(0.3, pad/15)}" stroke-linejoin="round" />`;
                if (coords.length > 2) {
                    html += `<line x1="${coords[coords.length-1].x}" y1="${-coords[coords.length-1].y}" x2="${coords[0].x}" y2="${-coords[0].y}" stroke="#3b82f6" stroke-width="${Math.max(0.2, pad/20)}" stroke-dasharray="${Math.max(1, pad/15)}" opacity="0.4" />`;
                }
            }
            coords.forEach((c, i) => {
                const color = i === 0 ? '#10b981' : i === coords.length-1 ? '#ef4444' : '#3b82f6';
                html += `<circle cx="${c.x}" cy="${-c.y}" r="${Math.max(0.8, pad/12)}" fill="${color}" stroke="#0f172a" stroke-width="${Math.max(0.1, pad/40)}" />`;
                html += `<text x="${c.x + 2}" y="${-c.y - 2}" fill="#475569" font-size="${Math.max(3, pad/8)}" font-weight="bold">${i+1}</text>`;
            });
            content.innerHTML = html;
            
            // Auto-zoom para mostrar todos los puntos
            resetZoom('gps');
        }

        function compartirGPS(formato) {
            if (puntosGPS.length === 0) return showToast("⚠️ Captura puntos primero");
            
            let data = "", name = `GeoCAD_${new Date().toISOString().slice(0,10)}`, tipoMime = 'text/plain';
            
            if (formato === 'kml') {
                const coordsBlock = puntosGPS.map(p => `${p.lng},${p.lat},${p.alt || 0}`).join('\n              ');
                const cierre = puntosGPS.length > 2 ? `\n              ${puntosGPS[0].lng},${puntosGPS[0].lat},${puntosGPS[0].alt || 0}` : '';
                
                data = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${name}</name>
    <Style id="polyStyle">
      <LineStyle><color>ff0000ff</color><width>3</width></LineStyle>
      <PolyStyle><color>400000ff</color></PolyStyle>
    </Style>
    <Placemark>
      <name>Terreno</name>
      <styleUrl>#polyStyle</styleUrl>
      <Polygon>
        <tessellate>1</tessellate>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>${coordsBlock}${cierre}</coordinates>
          </LinearRing>
        </outerBoundaryIs>
      </Polygon>
    </Placemark>
  </Document>
</kml>`;
                name += ".kml";
                tipoMime = 'application/vnd.google-earth.kml+xml';
            } else if (formato === 'scr') {
                data = "PDMODE 3\nPDSIZE 0.2\n";
                puntosGPS.forEach(p => data += `_POINT ${p.lng},${p.lat},${p.alt || 0}\n`);
                if (puntosGPS.length > 2) {
                    data += "_PLINE\n" + puntosGPS.map(p => `${p.lng},${p.lat},${p.alt || 0}`).join('\n') + "\n_CLOSE\n";
                }
                data += "_ZOOM _E\n";
                name += ".scr";
            }
            
            compartirArchivo(data, name, tipoMime);
        }

        // === MÓDULO MANUAL ===
        let coordManual = []; 
        let refGpsManual = null; 

        function guardarEstadoManual() {
            try {
                const data = { 
                    l1: document.getElementById('l1').value, 
                    l2: document.getElementById('l2').value, 
                    l3: document.getElementById('l3').value, 
                    l4: document.getElementById('l4').value, 
                    d1: document.getElementById('d1').value, 
                    refGps: refGpsManual 
                };
                localStorage.setItem('geoCad_manual', JSON.stringify(data)); 
            } catch(e) { console.log('Manual save:', e); }
        }

        function limpiarManual() {
            if(confirm("¿Borrar medidas?")) {
                ['l1','l2','l3','l4','d1'].forEach(id => document.getElementById(id).value = '');
                refGpsManual = null;
                document.getElementById('gps-data-manual').innerText = "Sin coordenada.";
                document.getElementById('error-manual').classList.add('hidden');
                document.getElementById('btn-compartir-manual').disabled = true;
                document.getElementById('btn-compartir-manual').classList.add('opacity-50', 'cursor-not-allowed');
                calcularManual();
            }
        }

        function calcularManual() {
            guardarEstadoManual();
            const l1 = parseFloat(document.getElementById('l1').value), 
                  l2 = parseFloat(document.getElementById('l2').value), 
                  l3 = parseFloat(document.getElementById('l3').value), 
                  l4 = parseFloat(document.getElementById('l4').value), 
                  d1 = parseFloat(document.getElementById('d1').value);
            
            const errDiv = document.getElementById('error-manual'), 
                  btnD = document.getElementById('btn-compartir-manual');
            
            coordManual = []; 
            errDiv.classList.add('hidden'); 
            btnD.disabled = true; 
            btnD.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('area-manual').innerText = "0 m²"; 
            document.getElementById('perim-manual').innerText = "0 m";
            
            const content = document.getElementById('svg-content-manual');
            content.innerHTML = '<text x="0" y="0" fill="#94a3b8" text-anchor="middle" font-size="12" font-weight="bold" transform="translate(140, 140)">Ingresa medidas...</text>';
            setMapViewBox('manual', -50, -50, 100, 100);
            
            if (!l1 || !l2 || !l3 || !l4 || !d1) return;
            
            const validTri1 = (l1 + l2 > d1) && (l1 + d1 > l2) && (l2 + d1 > l1);
            const validTri2 = (d1 + l3 > l4) && (d1 + l4 > l3) && (l3 + l4 > d1);
            
            if (!validTri1 || !validTri2) {
                errDiv.innerText = "⚠️ Medidas inválidas"; 
                errDiv.classList.remove('hidden'); 
                return;
            }

            const pA = { x: 0, y: 0 }, pB = { x: l1, y: 0 };
            const cosAlpha = (Math.pow(l1, 2) + Math.pow(d1, 2) - Math.pow(l2, 2)) / (2 * l1 * d1);
            const alpha = Math.acos(Math.max(-1, Math.min(1, cosAlpha)));
            const pC = { x: d1 * Math.cos(alpha), y: d1 * Math.sin(alpha) };
            const cosBeta = (Math.pow(d1, 2) + Math.pow(l4, 2) - Math.pow(l3, 2)) / (2 * d1 * l4);
            const beta = Math.acos(Math.max(-1, Math.min(1, cosBeta)));
            const pD = { x: l4 * Math.cos(alpha + beta), y: l4 * Math.sin(alpha + beta) };

            coordManual = [pA, pB, pC, pD];
            
            const s1 = (l1 + l2 + d1) / 2;
            const a1 = Math.sqrt(Math.max(0, s1 * (s1 - l1) * (s1 - l2) * (s1 - d1)));
            const s2 = (d1 + l3 + l4) / 2;
            const a2 = Math.sqrt(Math.max(0, s2 * (s2 - d1) * (s2 - l3) * (s2 - l4)));
            
            document.getElementById('area-manual').innerText = (a1 + a2).toLocaleString(undefined, {maximumFractionDigits: 1}) + " m²";
            document.getElementById('perim-manual').innerText = (l1 + l2 + l3 + l4).toLocaleString(undefined, {maximumFractionDigits: 1}) + " m";
            
            btnD.disabled = false; 
            btnD.classList.remove('opacity-50', 'cursor-not-allowed');
            dibujarMapaManual();
        }

        function dibujarMapaManual() {
            if (coordManual.length !== 4) return;
            const content = document.getElementById('svg-content-manual');
            const xs = coordManual.map(p => p.x), ys = coordManual.map(p => p.y);
            const w = Math.max(...xs) - Math.min(...xs), h = Math.max(...ys) - Math.min(...ys);
            const pad = Math.max(w, h) * 0.25 + 2;
            
            setMapViewBox('manual', Math.min(...xs) - pad, -Math.max(...ys) - pad, w + pad*2, h + pad*2);
            
            const pts = coordManual.map(p => `${p.x},${-p.y}`).join(' ');
            let html = `<polygon points="${pts}" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="${Math.max(0.4, pad/25)}" stroke-linejoin="round" />`;
            html += `<line x1="${coordManual[0].x}" y1="${-coordManual[0].y}" x2="${coordManual[2].x}" y2="${-coordManual[2].y}" stroke="#ef4444" stroke-width="${Math.max(0.2, pad/35)}" stroke-dasharray="${Math.max(1, pad/12)}" opacity="0.7" />`;
            
            const labels = ['A', 'B', 'C', 'D'];
            coordManual.forEach((p, i) => {
                html += `<circle cx="${p.x}" cy="${-p.y}" r="${Math.max(0.6, pad/15)}" fill="#10b981" stroke="white" stroke-width="${Math.max(0.1, pad/50)}" />`;
                html += `<text x="${p.x}" y="${-p.y - 1}" fill="#1e293b" font-size="${Math.max(2.5, pad/6)}" text-anchor="middle" font-weight="bold">${labels[i]}</text>`;
            });
            
            content.innerHTML = html;
            resetZoom('manual');
        }

        function capturarRefManual() {
            if (!actualGPS) return showToast("⏳ Sin GPS");
            refGpsManual = {...actualGPS}; 
            guardarEstadoManual();
            document.getElementById('gps-data-manual').innerHTML = `<span class="text-emerald-600 font-bold">✅ Anclado</span><br>Lat: ${refGpsManual.lat.toFixed(5)} | Lon: ${refGpsManual.lng.toFixed(5)}`;
            showToast("📍 Guardado");
        }

        function compartirManual() {
            if (coordManual.length !== 4) return showToast("⚠️ Calcula primero");
            
            let data = "; GeoCAD Pro - AutoCAD\n";
            data += "_PLINE\n"; 
            coordManual.forEach(p => data += `${p.x.toFixed(4)},${p.y.toFixed(4)}\n`); 
            data += "_CLOSE\n_ZOOM _E\n";
            
            const cx = (coordManual[0].x + coordManual[2].x) / 2, 
                  cy = (coordManual[0].y + coordManual[2].y) / 2;
            const th = Math.max(0.5, parseFloat(document.getElementById('l1').value || 10) * 0.05).toFixed(2);
            data += `_TEXT _J _MC ${cx.toFixed(4)},${cy.toFixed(4)}\n${th}\n0\nAREA: ${document.getElementById('area-manual').innerText}\n`;
            
            compartirArchivo(data, `TopoManual_${new Date().toISOString().slice(0,10)}.scr`, 'text/plain');
        }

        // === INICIALIZACIÓN ===
        window.addEventListener('load', () => {
            // Inicializar sistema Pan & Zoom
            initMapPanZoom('gps');
            initMapPanZoom('manual');
            
            try {
                const savedGPS = localStorage.getItem('geoCad_puntosGPS');
                if (savedGPS) { 
                    puntosGPS = JSON.parse(savedGPS); 
                    if (puntosGPS.length > 0) { 
                        renderTablaGPS(); 
                        dibujarMapaGPS(); 
                        calcularAreaGPS(); 
                    } 
                }
            } catch(e) { console.log('GPS load:', e); }
            
            try {
                const savedManual = localStorage.getItem('geoCad_manual');
                if (savedManual) {
                    const data = JSON.parse(savedManual);
                    ['l1','l2','l3','l4','d1'].forEach(id => { 
                        if(data[id]) document.getElementById(id).value = data[id]; 
                    });
                    if (data.refGps) { 
                        refGpsManual = data.refGps; 
                        document.getElementById('gps-data-manual').innerHTML = `<span class="text-emerald-600 font-bold">✅ Anclado</span><br>Lat: ${refGpsManual.lat.toFixed(5)} | Lon: ${refGpsManual.lng.toFixed(5)}`; 
                    }
                    if (data.l1 && data.l2 && data.l3 && data.l4 && data.d1) {
                        calcularManual();
                    }
                }
            } catch(e) { console.log('Manual load:', e); }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModalCompartir();
        });
    </script>
</body>
</html>
