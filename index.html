<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="GeoCAD Pro - Aplicación web para levantamientos topográficos con GPS y medición manual">
    <meta name="theme-color" content="#0f172a">
    <!-- Cache control para GitHub Pages -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GeoCAD Pro - Topo & GPS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: env(safe-area-inset-bottom); -webkit-tap-highlight-color: transparent; }
        input[type="number"] { font-size: 18px; }
        .map-bg {
            aspect-ratio: 1 / 1;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        button { touch-action: manipulation; }
        .toast {
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(100px);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        /* Animación para botones de compartir */
        @keyframes pulse-share {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .btn-share:hover { animation: pulse-share 0.3s ease-in-out; }
        /* Modal de compartir */
        .modal-overlay {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans mb-12 text-base select-none">

    <header class="bg-slate-900 text-white pt-5 shadow-lg sticky top-0 z-50">
        <div class="px-4 flex justify-between items-center pb-4">
            <div>
                <h1 class="text-xl font-bold text-emerald-400">GeoCAD Pro</h1>
                <p class="text-xs text-slate-300 font-medium tracking-widest flex items-center gap-1 mt-1">
                    AUTOGUARDADO ON <span class="bg-emerald-500 w-2 h-2 rounded-full animate-pulse"></span>
                </p>
            </div>
            <!-- Botones GPS con compartir -->
            <div id="descargas-gps" class="flex gap-2">
                <button onclick="compartirGPS('kml')" class="btn-share px-3 py-2 bg-sky-500 rounded-lg text-xs font-bold shadow-md hover:bg-sky-400 flex items-center gap-1 transition">
                    📤 .KML
                </button>
                <button onclick="compartirGPS('scr')" class="btn-share px-3 py-2 bg-blue-600 rounded-lg text-xs font-bold shadow-md hover:bg-blue-500 flex items-center gap-1 transition">
                    📤 .SCR
                </button>
            </div>
            <!-- Botones Manual con compartir -->
            <div id="descargas-manual" class="hidden flex gap-2">
                <button onclick="compartirManual()" id="btn-compartir-manual" class="btn-share px-3 py-2 bg-emerald-600 rounded-lg text-xs font-bold shadow-md opacity-50 cursor-not-allowed flex items-center gap-1 transition" disabled>
                    📤 CAD .SCR
                </button>
            </div>
        </div>
        
        <div class="flex bg-slate-800 text-sm font-bold">
            <button onclick="cambiarPestana('gps')" id="tab-gps" class="flex-1 py-4 border-b-4 border-blue-500 text-blue-400 transition-colors">
                📍 GPS (Caminar)
            </button>
            <button onclick="cambiarPestana('manual')" id="tab-manual" class="flex-1 py-4 border-b-4 border-transparent text-slate-400 transition-colors">
                📐 CINTA (Medir)
            </button>
        </div>
    </header>

    <main class="flex-1 relative">

        <!-- VISTA GPS -->
        <div id="vista-gps" class="p-4 space-y-5 pb-32">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">SEÑAL GPS</span>
                    <span id="gps-precision" class="text-xs px-3 py-1 rounded-full bg-slate-100 font-bold text-slate-500">Buscando...</span>
                </div>
                <div id="gps-coords-display" class="grid grid-cols-3 gap-2 text-sm text-slate-700">
                    <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">LAT<br>---</div>
                    <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">LON<br>---</div>
                    <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">ALT<br>---</div>
                </div>
                <div id="gps-error-panel" class="hidden mt-3 p-3 bg-red-50 rounded-xl border border-red-200 text-sm text-red-700 font-bold"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-600 text-white p-5 rounded-2xl shadow-md flex flex-col justify-center">
                    <span class="text-xs uppercase opacity-80 font-bold tracking-wider">Área Estimada</span>
                    <div id="area-gps" class="text-3xl font-black mt-1">0 m²</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <span class="text-xs uppercase text-slate-500 font-bold tracking-wider">Vértices</span>
                        <button onclick="limpiarGPS()" class="text-red-500 bg-red-50 p-2 rounded-lg font-bold text-xs uppercase">Borrar</button>
                    </div>
                    <div id="contador-gps" class="text-3xl font-black text-slate-800">0</div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl shadow-xl overflow-hidden border border-slate-700 relative">
                <div class="absolute top-3 left-3 z-10 bg-white/20 backdrop-blur px-3 py-1 rounded text-xs font-bold text-white">Croquis GPS</div>
                <div class="map-bg w-full flex items-center justify-center p-3">
                    <svg id="svg-gps" width="100%" height="100%" viewBox="0 0 100 100" class="overflow-visible">
                        <text id="gps-placeholder" x="50" y="50" fill="#94a3b8" text-anchor="middle" font-size="6">Captura puntos para dibujar</text>
                    </svg>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="max-h-[200px] overflow-y-auto">
                    <table class="w-full text-sm text-left">
                        <tbody id="lista-gps" class="divide-y divide-slate-100">
                            <tr><td class="p-5 text-center text-slate-400 italic">Los puntos aparecerán aquí</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-40">
                <button onclick="capturarPuntoGPS()" class="bg-blue-600 text-white w-24 h-24 rounded-full shadow-[0_10px_30px_rgba(37,99,235,0.5)] flex items-center justify-center border-4 border-white active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- VISTA MANUAL -->
        <div id="vista-manual" class="hidden p-4 space-y-5">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-sm font-bold text-slate-600 uppercase tracking-widest">Medidas (Metros)</h2>
                    <button onclick="limpiarManual()" class="text-xs text-red-600 font-bold bg-red-50 px-3 py-2 rounded-lg">LIMPIAR TODO</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500">Base (L1)</label>
                        <input type="number" id="l1" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-lg font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ej. 10.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500">Derecha (L2)</label>
                        <input type="number" id="l2" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-lg font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ej. 20.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500">Arriba (L3)</label>
                        <input type="number" id="l3" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-lg font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ej. 10.00" oninput="calcularManual()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500">Izquierda (L4)</label>
                        <input type="number" id="l4" step="0.01" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-lg font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ej. 20.00" oninput="calcularManual()">
                    </div>
                </div>
                <div class="mt-4 space-y-1">
                    <label class="text-xs font-bold text-red-600 uppercase">Diagonal (D1)</label>
                    <input type="number" id="d1" step="0.01" class="w-full bg-red-50 border border-red-300 rounded-lg p-3 text-lg font-mono text-red-700 focus:ring-2 focus:ring-red-500 outline-none" placeholder="Cruce (Ej. 22.36)" oninput="calcularManual()">
                </div>
                <div id="error-manual" class="hidden mt-3 text-sm text-red-700 font-bold bg-red-100 p-3 rounded-lg border border-red-200"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-600 text-white p-5 rounded-2xl shadow-md flex flex-col justify-center">
                    <span class="text-xs uppercase opacity-80 font-bold tracking-wider">Área Exacta</span>
                    <div id="area-manual" class="text-3xl font-black mt-1">0 m²</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center">
                    <span class="text-xs uppercase text-slate-500 font-bold tracking-wider">Perímetro</span>
                    <div id="perim-manual" class="text-2xl font-black text-slate-800 mt-1">0 m</div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-300 relative">
                <div class="absolute top-3 left-3 z-10 bg-white/90 backdrop-blur px-3 py-1 rounded text-xs font-bold text-slate-600 shadow-sm">
                    Forma Real Calculada
                </div>
                <div class="map-bg w-full flex items-center justify-center p-4">
                    <svg id="svg-manual" width="100%" height="100%" viewBox="0 0 100 100" class="overflow-visible">
                        <text id="manual-placeholder" x="50" y="50" fill="#94a3b8" text-anchor="middle" font-size="6" font-weight="bold">Faltan medidas...</text>
                    </svg>
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-slate-600 uppercase">Punto Global</span>
                    <button onclick="capturarRefManual()" id="btn-gps-manual" class="text-xs bg-slate-800 text-white px-4 py-2 rounded-lg font-bold active:bg-slate-700">ANCLAR GPS</button>
                </div>
                <div id="gps-data-manual" class="text-xs text-slate-500 font-mono mt-2">
                    Sin coordenada. AutoCAD lo dibujará en X:0, Y:0.
                </div>
            </div>
        </div>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-1/2 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full text-sm font-bold opacity-0 pointer-events-none z-50 toast shadow-2xl whitespace-nowrap max-w-[90vw] text-center">
        Notificación
    </div>

    <!-- Modal de Compartir (se inyecta dinámicamente) -->
    <div id="modal-compartir" class="hidden"></div>

    <script>
        // === UTILIDADES GENERALES ===
        function cambiarPestana(vista) {
            const vGps = document.getElementById('vista-gps'), vMan = document.getElementById('vista-manual');
            const tGps = document.getElementById('tab-gps'), tMan = document.getElementById('tab-manual');
            const dGps = document.getElementById('descargas-gps'), dMan = document.getElementById('descargas-manual');

            if (vista === 'gps') {
                vGps.classList.remove('hidden'); vMan.classList.add('hidden');
                dGps.classList.remove('hidden'); dMan.classList.add('hidden');
                tGps.className = "flex-1 py-4 border-b-4 border-blue-500 text-blue-400 transition-colors";
                tMan.className = "flex-1 py-4 border-b-4 border-transparent text-slate-400 transition-colors";
            } else {
                vGps.classList.add('hidden'); vMan.classList.remove('hidden');
                dGps.classList.add('hidden'); dMan.classList.remove('hidden');
                tMan.className = "flex-1 py-4 border-b-4 border-emerald-500 text-emerald-400 transition-colors";
                tGps.className = "flex-1 py-4 border-b-4 border-transparent text-slate-400 transition-colors";
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Función de descarga mejorada con MIME types correctos
        function triggerDescarga(contenido, nombreArchivo, tipoMime = 'text/plain') {
            if (nombreArchivo.endsWith('.kml')) tipoMime = 'application/vnd.google-earth.kml+xml';
            if (nombreArchivo.endsWith('.scr')) tipoMime = 'text/plain';
            
            try {
                const blob = new Blob([contenido], { type: tipoMime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = nombreArchivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
                showToast(`📥 ${nombreArchivo} descargado`);
                return true;
            } catch (e) {
                console.error('Error en descarga:', e);
                showToast('❌ Error al descargar');
                return false;
            }
        }

        // === FUNCIONES DE COMPARTIR ===
        async function compartirArchivo(contenido, nombreArchivo, tipoMime) {
            // Ajustar MIME type
            if (nombreArchivo.endsWith('.kml')) tipoMime = 'application/vnd.google-earth.kml+xml';
            
            // ✅ Opción 1: Web Share API (navegadores modernos con HTTPS)
            if (navigator.share) {
                try {
                    // Preparar archivo para compartir
                    const file = new File([contenido], nombreArchivo, { type: tipoMime });
                    
                    // Verificar si se puede compartir archivos
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'GeoCAD Pro - Levantamiento',
                            text: 'Te comparto este levantamiento topográfico generado con GeoCAD Pro 🗺️',
                            files: [file]
                        });
                        showToast('✅ Enviado exitosamente');
                        return;
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.log('Web Share no disponible, usando fallback:', err);
                    }
                }
            }
            
            // ✅ Opción 2: Fallback con modal de opciones
            mostrarOpcionesCompartir(contenido, nombreArchivo, tipoMime);
        }

        function mostrarOpcionesCompartir(contenido, nombreArchivo, tipoMime) {
            // Evitar múltiples modales
            const existing = document.getElementById('modal-compartir');
            if (existing && !existing.classList.contains('hidden')) return;
            
            // Codificar contenido para URLs (limitado a ~2000 chars para compatibilidad)
            const contenidoCorto = encodeURIComponent(contenido.slice(0, 1500));
            const nombreEncoded = encodeURIComponent(nombreArchivo);
            const textoBase = encodeURIComponent(`🗺️ Levantamiento GeoCAD Pro: ${nombreArchivo}\n\nÁrea calculada y coordenadas listas para importar.`);
            
            const modal = document.createElement('div');
            modal.id = 'modal-compartir';
            modal.className = 'fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl transform transition-all scale-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-lg text-slate-800">📤 Compartir archivo</h3>
                        <button onclick="cerrarModalCompartir()" class="text-slate-400 hover:text-slate-600 text-2xl font-bold">&times;</button>
                    </div>
                    
                    <p class="text-sm text-slate-600 mb-4">Elige cómo quieres compartir <strong>${nombreArchivo}</strong>:</p>
                    
                    <div class="space-y-3">
                        <!-- WhatsApp -->
                        <a href="https://wa.me/?text=${textoBase}%0A%0A📎 Archivo: ${nombreEncoded}%0A💡 Tip: Descarga el archivo y adjúntalo manualmente en WhatsApp." 
                           target="_blank" rel="noopener"
                           class="flex items-center gap-3 p-4 bg-[#25D366] text-white rounded-xl font-bold hover:bg-[#128C7E] transition shadow-md">
                            <span class="text-xl">💬</span> 
                            <div class="text-left">
                                <div>WhatsApp</div>
                                <div class="text-xs opacity-90 font-normal">Abrir chat + instrucciones</div>
                            </div>
                        </a>
                        
                        <!-- Telegram -->
                        <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${textoBase}%0A%0A📎 Descarga el archivo .KML/.SCR desde: ${window.location.href}" 
                           target="_blank" rel="noopener"
                           class="flex items-center gap-3 p-4 bg-[#0088cc] text-white rounded-xl font-bold hover:bg-[#006699] transition shadow-md">
                            <span class="text-xl">✈️</span>
                            <div class="text-left">
                                <div>Telegram</div>
                                <div class="text-xs opacity-90 font-normal">Compartir enlace + datos</div>
                            </div>
                        </a>
                        
                        <!-- Email -->
                        <a href="mailto:?subject=${encodeURIComponent('Levantamiento GeoCAD Pro - ' + nombreArchivo)}&body=${encodeURIComponent(`Hola,\n\nTe envío este levantamiento topográfico generado con GeoCAD Pro.\n\n📊 Archivo: ${nombreArchivo}\n🔗 App: ${window.location.href}\n\n💡 Nota: Adjunta el archivo .KML o .SCR manualmente desde tu dispositivo.\n\n---\nGeoCAD Pro - Topografía GPS & Manual`)}" 
                           class="flex items-center gap-3 p-4 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-800 transition shadow-md">
                            <span class="text-xl">📧</span>
                            <div class="text-left">
                                <div>Correo Electrónico</div>
                                <div class="text-xs opacity-90 font-normal">Redactar email con datos</div>
                            </div>
                        </a>
                        
                        <!-- Descargar como fallback -->
                        <button onclick="cerrarModalCompartir(); triggerDescarga('${contenido.replace(/'/g, "\\'").replace(/\n/g, '\\n')}', '${nombreArchivo}', '${tipoMime}')" 
                                class="w-full p-4 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition shadow-md flex items-center justify-center gap-2">
                            <span>⬇️</span> Descargar archivo directamente
                        </button>
                    </div>
                    
                    <p class="text-xs text-slate-500 mt-4 text-center">
                        💡 <strong>Tip:</strong> WhatsApp/Telegram no permiten adjuntar archivos vía enlace. 
                        Descarga el archivo primero y luego adjúntalo manualmente en la app.
                    </p>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Cerrar al hacer clic fuera del modal
            modal.addEventListener('click', (e) => {
                if (e.target === modal) cerrarModalCompartir();
            });
        }

        function cerrarModalCompartir() {
            const modal = document.getElementById('modal-compartir');
            if (modal) {
                modal.classList.add('hidden');
                setTimeout(() => modal.remove(), 200);
            }
        }

        // === CONSTANTES Y VARIABLES GLOBALES ===
        const R = 6371000; // Radio de la Tierra en metros

        // === MÓDULO GPS ===
        let puntosGPS = [];
        let actualGPS = null;

        function guardarEstadoGPS() { 
            try { localStorage.setItem('geoCad_puntosGPS', JSON.stringify(puntosGPS)); } 
            catch(e) { console.log('LocalStorage GPS:', e); }
        }

        function limpiarGPS() {
            if(confirm("¿Borrar TODOS los puntos GPS? Esta acción no se puede deshacer.")) {
                puntosGPS = []; 
                guardarEstadoGPS(); 
                renderTablaGPS(); 
                dibujarMapaGPS(); 
                calcularAreaGPS();
                showToast("🗑️ Puntos GPS borrados");
            }
        }

        // Inicializar GPS
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                pos => {
                    actualGPS = { 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude, 
                        alt: pos.coords.altitude || 0, 
                        acc: pos.coords.accuracy 
                    };
                    document.getElementById('gps-error-panel').classList.add('hidden');
                    document.getElementById('gps-coords-display').innerHTML = `
                        <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">LAT<br>${actualGPS.lat.toFixed(5)}</div>
                        <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">LON<br>${actualGPS.lng.toFixed(5)}</div>
                        <div class="bg-slate-50 p-3 rounded-lg text-center border border-slate-200 font-mono font-bold">ALT<br>${actualGPS.alt.toFixed(0)}m</div>
                    `;
                    const badge = document.getElementById('gps-precision');
                    const precision = actualGPS.acc.toFixed(1);
                    badge.innerText = `±${precision}m`;
                    badge.className = `text-xs px-3 py-1 rounded-full font-bold text-white ${actualGPS.acc < 8 ? 'bg-green-600' : actualGPS.acc < 20 ? 'bg-orange-500' : 'bg-red-500'}`;
                },
                err => {
                    const ep = document.getElementById('gps-error-panel'); 
                    ep.classList.remove('hidden');
                    switch(err.code) {
                        case 1: ep.innerText = "⚠️ Permiso GPS denegado. Actívalo en configuración del navegador."; break;
                        case 2: ep.innerText = "📡 Señal GPS débil. Busca un lugar abierto."; break;
                        case 3: ep.innerText = "⏱️ Tiempo de espera agotado. Reintentando..."; break;
                        default: ep.innerText = "❌ Error de GPS: " + err.message;
                    }
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        } else {
            document.getElementById('gps-error-panel').classList.remove('hidden');
            document.getElementById('gps-error-panel').innerText = "❌ Tu navegador no soporta Geolocalización";
        }

        function capturarPuntoGPS() {
            if (!actualGPS) return showToast("⏳ Esperando señal GPS...");
            if (actualGPS.acc > 50) {
                if(!confirm(`⚠️ Precisión baja (±${actualGPS.acc.toFixed(0)}m). ¿Capturar igual?`)) return;
            }
            puntosGPS.push({...actualGPS, id: Date.now(), timestamp: new Date().toISOString()});
            guardarEstadoGPS(); 
            showToast(`✅ Punto #${puntosGPS.length} capturado`);
            renderTablaGPS(); 
            dibujarMapaGPS(); 
            calcularAreaGPS();
        }

        function eliminarPuntoGPS(id) {
            if(confirm("¿Eliminar este punto?")) {
                puntosGPS = puntosGPS.filter(p => p.id !== id);
                guardarEstadoGPS(); 
                renderTablaGPS(); 
                dibujarMapaGPS(); 
                calcularAreaGPS();
                showToast("🗑️ Punto eliminado");
            }
        }

        function renderTablaGPS() {
            document.getElementById('contador-gps').innerText = puntosGPS.length;
            if (puntosGPS.length === 0) {
                document.getElementById('lista-gps').innerHTML = '<tr><td class="p-5 text-center text-slate-400 italic">Captura puntos caminando por el perímetro</td></tr>';
                return;
            }
            const html = puntosGPS.slice().reverse().map(p => `
                <tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="p-4 font-black text-blue-600">#${puntosGPS.length - puntosGPS.indexOf(p)}</td>
                    <td class="p-4 font-mono text-slate-600 text-sm">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</td>
                    <td class="p-4 text-right">
                        <button onclick="eliminarPuntoGPS(${p.id})" class="text-red-500 font-bold bg-red-50 px-3 py-2 rounded-lg text-xs hover:bg-red-100 transition">X</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('lista-gps').innerHTML = html;
        }

        function calcularAreaGPS() {
            if (puntosGPS.length < 3) {
                document.getElementById('area-gps').innerText = "0 m²";
                return;
            }
            const origin = puntosGPS[0];
            const coords = puntosGPS.map(p => ({
                x: (p.lng - origin.lng) * (Math.PI / 180) * R * Math.cos(origin.lat * Math.PI / 180),
                y: (p.lat - origin.lat) * (Math.PI / 180) * R
            }));
            let area = 0;
            for (let i = 0; i < coords.length; i++) {
                let j = (i + 1) % coords.length;
                area += coords[i].x * coords[j].y - coords[j].x * coords[i].y;
            }
            const areaM2 = Math.abs(area) / 2;
            document.getElementById('area-gps').innerText = areaM2.toLocaleString(undefined, {maximumFractionDigits: 1}) + " m²";
        }

        function dibujarMapaGPS() {
            const svg = document.getElementById('svg-gps');
            if (puntosGPS.length === 0) { 
                svg.innerHTML = '<text x="50" y="50" fill="#94a3b8" text-anchor="middle" font-size="6">Polígono vacío</text>'; 
                return; 
            }
            const origin = puntosGPS[0];
            const coords = puntosGPS.map(p => ({ 
                x: (p.lng - origin.lng) * (Math.PI / 180) * R * Math.cos(origin.lat * Math.PI / 180), 
                y: (p.lat - origin.lat) * (Math.PI / 180) * R 
            }));
            const xs = coords.map(c => c.x), ys = coords.map(c => c.y);
            const w = (Math.max(...xs) - Math.min(...xs)) || 2, h = (Math.max(...ys) - Math.min(...ys)) || 2;
            const pad = Math.max(w, h) * 0.3 || 10;
            
            svg.setAttribute('viewBox', `${Math.min(...xs) - pad} ${Math.min(...ys) - pad} ${w + pad*2} ${h + pad*2}`);
            let html = '';
            
            // Dibujar polígono
            if (coords.length > 1) {
                const pts = coords.map(c => `${c.x},${-c.y}`).join(' ');
                const fillOpacity = coords.length >= 3 ? '0.2' : '0';
                html += `<polyline points="${pts}" fill="rgba(59, 130, 246, ${fillOpacity})" stroke="#3b82f6" stroke-width="${Math.max(0.3, pad/15)}" stroke-linejoin="round" />`;
                // Línea de cierre punteada si no está cerrado
                if (coords.length >= 3) {
                    html += `<line x1="${coords[coords.length-1].x}" y1="${-coords[coords.length-1].y}" x2="${coords[0].x}" y2="${-coords[0].y}" stroke="#3b82f6" stroke-width="${Math.max(0.2, pad/20)}" stroke-dasharray="${Math.max(1, pad/15)}" opacity="0.4" />`;
                }
            }
            // Dibujar puntos
            coords.forEach((c, i) => {
                const esInicio = i === 0, esActual = i === coords.length - 1;
                const color = esInicio ? '#10b981' : esActual ? '#ef4444' : '#3b82f6';
                const radio = Math.max(0.8, pad/12);
                html += `<circle cx="${c.x}" cy="${-c.y}" r="${radio}" fill="${color}" stroke="#0f172a" stroke-width="${Math.max(0.1, pad/40)}" />`;
                // Numerar vértices
                html += `<text x="${c.x + radio*2}" y="${-c.y - radio}" fill="#475569" font-size="${Math.max(2, pad/8)}" font-weight="bold">${i+1}</text>`;
            });
            svg.innerHTML = html;
        }

        // === FUNCIONES COMPARTIR/EXPORTAR GPS ===
        function compartirGPS(formato) {
            if (puntosGPS.length === 0) return showToast("⚠️ Captura al menos 3 puntos primero");
            
            let data = "", name = `GeoCAD_${new Date().toISOString().slice(0,10)}`, tipoMime = 'text/plain';
            
            if (formato === 'kml') {
                // Generar KML válido para Google Earth
                const coordsBlock = puntosGPS.map(p => `${p.lng},${p.lat},${p.alt || 0}`).join('\n              ');
                const cierre = puntosGPS.length > 2 ? `\n              ${puntosGPS[0].lng},${puntosGPS[0].lat},${puntosGPS[0].alt || 0}` : '';
                
                data = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${name}</name>
    <description>Levantamiento topográfico generado con GeoCAD Pro - ${new Date().toLocaleDateString('es-ES')}</description>
    <Style id="polyStyle">
      <LineStyle><color>ff0000ff</color><width>3</width></LineStyle>
      <PolyStyle><color>400000ff</color><outline>1</outline><fill>1</fill></PolyStyle>
    </Style>
    <Placemark>
      <name>Terreno Levantado</name>
      <description>Área: ${document.getElementById('area-gps').innerText} | Vértices: ${puntosGPS.length}</description>
      <styleUrl>#polyStyle</styleUrl>
      <Polygon>
        <tessellate>1</tessellate>
        <altitudeMode>clampToGround</altitudeMode>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>
              ${coordsBlock}${cierre}
            </coordinates>
          </LinearRing>
        </outerBoundaryIs>
      </Polygon>
    </Placemark>
  </Document>
</kml>`;
                name += ".kml";
                tipoMime = 'application/vnd.google-earth.kml+xml';
            } else if (formato === 'scr') {
                // Generar script para AutoCAD
                data = "; GeoCAD Pro - Script AutoCAD\n";
                data += "; Generado: " + new Date().toLocaleString('es-ES') + "\n";
                data += "PDMODE 3\nPDSIZE 0.2\n";
                puntosGPS.forEach((p, i) => {
                    data += `_POINT ${p.lng},${p.lat},${p.alt || 0} ; Punto #${i+1}\n`;
                });
                if (puntosGPS.length > 2) {
                    data += "\n; Dibujar polígono\n_PLINE\n";
                    puntosGPS.forEach(p => data += `${p.lng},${p.lat},${p.alt || 0}\n`);
                    data += "_CLOSE\n";
                }
                data += "_ZOOM _E\n";
                name += ".scr";
            }
            
            compartirArchivo(data, name, tipoMime);
        }

        // === MÓDULO MANUAL ===
        let coordManual = []; 
        let refGpsManual = null; 

        function guardarEstadoManual() {
            try {
                const data = { 
                    l1: document.getElementById('l1').value, 
                    l2: document.getElementById('l2').value, 
                    l3: document.getElementById('l3').value, 
                    l4: document.getElementById('l4').value, 
                    d1: document.getElementById('d1').value, 
                    refGps: refGpsManual 
                };
                localStorage.setItem('geoCad_manual', JSON.stringify(data)); 
            } catch(e) { console.log('LocalStorage Manual:', e); }
        }

        function limpiarManual() {
            if(confirm("¿Borrar todas las medidas de cinta?")) {
                ['l1','l2','l3','l4','d1'].forEach(id => document.getElementById(id).value = '');
                refGpsManual = null;
                document.getElementById('gps-data-manual').innerText = "Sin coordenada. AutoCAD lo dibujará en X:0, Y:0.";
                document.getElementById('error-manual').classList.add('hidden');
                document.getElementById('btn-compartir-manual').disabled = true;
                document.getElementById('btn-compartir-manual').classList.add('opacity-50', 'cursor-not-allowed');
                calcularManual();
                showToast("🗑️ Medidas borradas");
            }
        }

        function calcularManual() {
            guardarEstadoManual();
            const l1 = parseFloat(document.getElementById('l1').value), 
                  l2 = parseFloat(document.getElementById('l2').value), 
                  l3 = parseFloat(document.getElementById('l3').value), 
                  l4 = parseFloat(document.getElementById('l4').value), 
                  d1 = parseFloat(document.getElementById('d1').value);
            
            const errDiv = document.getElementById('error-manual'), 
                  btnD = document.getElementById('btn-compartir-manual');
            
            coordManual = []; 
            errDiv.classList.add('hidden'); 
            btnD.disabled = true; 
            btnD.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('area-manual').innerText = "0 m²"; 
            document.getElementById('perim-manual').innerText = "0 m";
            document.getElementById('svg-manual').innerHTML = '<text id="manual-placeholder" x="50" y="50" fill="#94a3b8" text-anchor="middle" font-size="6" font-weight="bold">Ingresa medidas...</text>';
            
            // Validar que todos los campos tengan valor
            if (!l1 || !l2 || !l3 || !l4 || !d1) return;
            
            // Validar desigualdad triangular para ambos triángulos
            const validTri1 = (l1 + l2 > d1) && (l1 + d1 > l2) && (l2 + d1 > l1);
            const validTri2 = (d1 + l3 > l4) && (d1 + l4 > l3) && (l3 + l4 > d1);
            
            if (!validTri1 || !validTri2) {
                errDiv.innerText = "⚠️ Medidas inválidas: No forman triángulos válidos. Revisa las longitudes."; 
                errDiv.classList.remove('hidden'); 
                return;
            }

            // Calcular coordenadas usando trigonometría
            const pA = { x: 0, y: 0 }, pB = { x: l1, y: 0 };
            
            // Triángulo ABC: calcular ángulo en A
            const cosAlpha = (Math.pow(l1, 2) + Math.pow(d1, 2) - Math.pow(l2, 2)) / (2 * l1 * d1);
            const alpha = Math.acos(Math.max(-1, Math.min(1, cosAlpha))); // Clamp para evitar errores de precisión
            const pC = { x: d1 * Math.cos(alpha), y: d1 * Math.sin(alpha) };
            
            // Triángulo ACD: calcular ángulo entre AC y AD
            const cosBeta = (Math.pow(d1, 2) + Math.pow(l4, 2) - Math.pow(l3, 2)) / (2 * d1 * l4);
            const beta = Math.acos(Math.max(-1, Math.min(1, cosBeta)));
            const pD = { x: l4 * Math.cos(alpha + beta), y: l4 * Math.sin(alpha + beta) };

            coordManual = [pA, pB, pC, pD];
            
            // Calcular área con fórmula de Herón para ambos triángulos
            const s1 = (l1 + l2 + d1) / 2;
            const a1 = Math.sqrt(Math.max(0, s1 * (s1 - l1) * (s1 - l2) * (s1 - d1)));
            const s2 = (d1 + l3 + l4) / 2;
            const a2 = Math.sqrt(Math.max(0, s2 * (s2 - d1) * (s2 - l3) * (s2 - l4)));
            
            const areaTotal = a1 + a2;
            const perimetro = l1 + l2 + l3 + l4;
            
            document.getElementById('area-manual').innerText = areaTotal.toLocaleString(undefined, {maximumFractionDigits: 1}) + " m²";
            document.getElementById('perim-manual').innerText = perimetro.toLocaleString(undefined, {maximumFractionDigits: 1}) + " m";
            
            // Habilitar botón de compartir
            btnD.disabled = false; 
            btnD.classList.remove('opacity-50', 'cursor-not-allowed');
            dibujarMapaManual();
        }

        function dibujarMapaManual() {
            if (coordManual.length !== 4) return;
            const svg = document.getElementById('svg-manual');
            const xs = coordManual.map(p => p.x), ys = coordManual.map(p => p.y);
            const w = Math.max(...xs) - Math.min(...xs), h = Math.max(...ys) - Math.min(...ys);
            const pad = Math.max(w, h) * 0.25 + 2;
            
            // Ajustar viewBox para mostrar todo el polígono
            svg.setAttribute('viewBox', `${Math.min(...xs) - pad} ${-Math.max(...ys) - pad} ${w + pad*2} ${h + pad*2}`);
            
            // Dibujar polígono
            const pts = coordManual.map(p => `${p.x},${-p.y}`).join(' ');
            let html = `<polygon points="${pts}" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="${Math.max(0.4, pad/25)}" stroke-linejoin="round" />`;
            
            // Dibujar diagonal (medida de verificación)
            html += `<line x1="${coordManual[0].x}" y1="${-coordManual[0].y}" x2="${coordManual[2].x}" y2="${-coordManual[2].y}" stroke="#ef4444" stroke-width="${Math.max(0.2, pad/35)}" stroke-dasharray="${Math.max(1, pad/12)}" opacity="0.7" />`;
            
            // Dibujar vértices y etiquetas
            const labels = ['A', 'B', 'C', 'D'];
            coordManual.forEach((p, i) => {
                const radio = Math.max(0.6, pad/15);
                html += `<circle cx="${p.x}" cy="${-p.y}" r="${radio}" fill="#10b981" stroke="white" stroke-width="${Math.max(0.1, pad/50)}" />`;
                html += `<text x="${p.x}" y="${-p.y - radio - 1}" fill="#1e293b" font-size="${Math.max(2.5, pad/6)}" text-anchor="middle" font-weight="bold">${labels[i]}</text>`;
            });
            
            // Mostrar medidas en los lados
            const medidas = [
                {p1: coordManual[0], p2: coordManual[1], val: document.getElementById('l1').value + 'm'},
                {p1: coordManual[1], p2: coordManual[2], val: document.getElementById('l2').value + 'm'},
                {p1: coordManual[2], p2: coordManual[3], val: document.getElementById('l3').value + 'm'},
                {p1: coordManual[3], p2: coordManual[0], val: document.getElementById('l4').value + 'm'}
            ];
            medidas.forEach(m => {
                const mx = (m.p1.x + m.p2.x) / 2, my = (m.p1.y + m.p2.y) / 2;
                html += `<text x="${mx}" y="${-my + 2}" fill="#64748b" font-size="${Math.max(1.5, pad/10)}" text-anchor="middle">${m.val}</text>`;
            });
            
            svg.innerHTML = html;
        }

        function capturarRefManual() {
            if (!actualGPS) return showToast("⏳ No hay señal GPS disponible");
            refGpsManual = {...actualGPS}; 
            guardarEstadoManual();
            document.getElementById('gps-data-manual').innerHTML = `<span class="text-emerald-600 font-bold">✅ Anclado</span> (±${refGpsManual.acc.toFixed(1)}m)<br>Lat: ${refGpsManual.lat.toFixed(5)} | Lon: ${refGpsManual.lng.toFixed(5)}`;
            showToast("📍 Referencia GPS guardada");
        }

        // === FUNCIÓN COMPARTIR MANUAL ===
        function compartirManual() {
            if (coordManual.length !== 4) return showToast("⚠️ Primero completa y calcula las medidas");
            
            let data = "; GeoCAD Pro - Script AutoCAD (Medición Manual)\n";
            data += "; Generado: " + new Date().toLocaleString('es-ES') + "\n";
            data += "; Área: " + document.getElementById('area-manual').innerText + " | Perímetro: " + document.getElementById('perim-manual').innerText + "\n\n";
            
            data += "_PLINE\n"; 
            coordManual.forEach((p, i) => {
                data += `${p.x.toFixed(4)},${p.y.toFixed(4)} ; Vértice ${String.fromCharCode(65+i)}\n`;
            }); 
            data += "_CLOSE\n";
            
            // Agregar texto con información del área
            const cx = (coordManual[0].x + coordManual[2].x) / 2, 
                  cy = (coordManual[0].y + coordManual[2].y) / 2;
            const th = Math.max(0.5, parseFloat(document.getElementById('l1').value || 10) * 0.05).toFixed(2);
            data += `_TEXT _J _MC ${cx.toFixed(4)},${cy.toFixed(4)}\n${th}\n0\nAREA: ${document.getElementById('area-manual').innerText}\n`;
            data += "_ZOOM _E\n";
            
            const nombreArchivo = `TopoManual_${new Date().toISOString().slice(0,10)}.scr`;
            compartirArchivo(data, nombreArchivo, 'text/plain');
        }

        // === INICIALIZACIÓN ===
        window.addEventListener('load', () => {
            // Cargar datos GPS guardados
            try {
                const savedGPS = localStorage.getItem('geoCad_puntosGPS');
                if (savedGPS) { 
                    puntosGPS = JSON.parse(savedGPS); 
                    if (puntosGPS.length > 0) { 
                        renderTablaGPS(); 
                        dibujarMapaGPS(); 
                        calcularAreaGPS(); 
                        showToast("📦 Datos GPS restaurados");
                    } 
                }
            } catch(e) { console.log('Error cargando GPS:', e); }
            
            // Cargar datos manuales guardados
            try {
                const savedManual = localStorage.getItem('geoCad_manual');
                if (savedManual) {
                    const data = JSON.parse(savedManual);
                    ['l1','l2','l3','l4','d1'].forEach(id => { 
                        if(data[id]) document.getElementById(id).value = data[id]; 
                    });
                    if (data.refGps) { 
                        refGpsManual = data.refGps; 
                        document.getElementById('gps-data-manual').innerHTML = `<span class="text-emerald-600 font-bold">✅ Anclado</span><br>Lat: ${refGpsManual.lat.toFixed(5)} | Lon: ${refGpsManual.lng.toFixed(5)}`; 
                    }
                    if (data.l1 && data.l2 && data.l3 && data.l4 && data.d1) {
                        calcularManual();
                    }
                }
            } catch(e) { console.log('Error cargando Manual:', e); }
            
            // Debug info (solo desarrollo)
            // console.log('🔐 HTTPS:', window.location.protocol === 'https:');
            // console.log('📤 Web Share:', !!navigator.share);
        });

        // Prevenir zoom en inputs en iOS
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // Cerrar modal con tecla ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModalCompartir();
        });
    </script>
</body>
